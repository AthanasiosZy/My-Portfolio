<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number Game</title>
    <link rel="stylesheet" href="guessgame.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="game-title">
            <span class="game-icon">🎯</span>
            <h1>GUESS THE NUMBER</h1>
            <p>Can you guess the secret number?</p>
        </div>
        
        <div class="game-card">
            <div class="game-info">
                <p class="question">I'm thinking of a number between 1 and 100</p>
                <p class="attempts" id="attempts">Attempts: 0 / 10</p>
            </div>
            
            <div class="input-group">
                <input type="number" id="guess-input" placeholder="Enter your guess" min="1" max="100">
            </div>
            
            <div class="btn-group">
                <button id="guess-btn">Guess</button>
                <button id="restart-btn">Restart</button>
            </div>
            
            <div class="message-box">
                <p id="message"></p>
            </div>
        
        <div class="back-link">
            <a href="#" onclick="window.close(); return false;">← Back to Projects</a>
        </div>
    
    <script src="guessgame.js"></script>
</body>
</html>
